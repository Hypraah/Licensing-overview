    /* ─── Typography System ─── */
    .t-hero { font-size: 28px; font-weight: 600; letter-spacing: -0.02em; color: var(--text-1); line-height: 1.2; }
    .t-title { font-size: 18px; font-weight: 600; letter-spacing: -0.01em; color: var(--text-1); line-height: 1.3; }
    .t-subtitle { font-size: 13px; font-weight: 500; color: var(--text-2); line-height: 1.5; }
    .t-label { font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-3); }

    .t-mono { font-family: var(--font-mono); font-size: 12px; color: var(--text-2); line-height: 1.65; }

    .divider { height: 1px; background: var(--border); margin: 16px 0; }

    * { box-sizing: border-box; }

      font-family: var(--font-sans);

      height: 100vh;
      width: 100vw;
      margin: 0;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ─── Scrollbar ─── */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.06); border-radius: 999px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(34, 211, 238, 0.2); }

    /* ─── Background Layers ─── */
    .bg-noise {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      opacity: 0.006;

    /* ─── Keyframes ─── */
    @keyframes fade-in {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }

    @keyframes pulseGlow {

      from { clip-path: circle(0% at 50% 50%); }

      0% { top: 0; opacity: 0.4; }

      0% { transform: scale(1); }

  <script>
    window.onerror = function(msg, src, line, col, err) {
      if (document.getElementById('crash-overlay')) return false;
      const d = document.createElement('div');
      d.id = 'crash-overlay';
      Object.assign(d.style, { position:'fixed', inset:'0', zIndex:'99999', background:'#05070a', color:'#ff6b6b', padding:'48px', fontFamily:'monospace', overflowY:'auto' });
      d.innerHTML = '<h1 style="font-size:20px;margin-bottom:16px">Runtime Error</h1><pre style="background:#0a0e18;padding:24px;border-radius:16px;color:#b8c0cc;white-space:pre-wrap;border:1px solid rgba(255,255,255,0.06)">' + (err && err.stack ? err.stack : msg) + '</pre>';
      (document.body || document.documentElement).prepend(d);
      return false;
    };
    window.addEventListener('unhandledrejection', function(e) {
      window.onerror(String(e.reason), '', 0, 0, e.reason);
    });
  </script>

  <script type="text/babel" data-type="module">

    // ─── Flag ISO Code Mapper ───
    const COUNTRY_ISO = {
      'Afghanistan':'af','Albania':'al','Algeria':'dz','Angola':'ao','Argentina':'ar','Armenia':'am','Australia':'au',
      'Austria':'at','Azerbaijan':'az','Bahrain':'bh','Bangladesh':'bd','Belarus':'by','Belgium':'be',
      'Belize':'bz','Benin':'bj','Bolivia':'bo','Bosnia':'ba','Botswana':'bw','Brazil':'br',
      'Bulgaria':'bg','Burkina Faso':'bf','Burundi':'bi','Cambodia':'kh','Cameroon':'cm','Canada':'ca',
      'Central African Republic':'cf','Chad':'td','Chile':'cl','China':'cn','Colombia':'co','Comoros':'km',
      'Congo':'cg','Costa Rica':'cr',"Cote d'Group":'ci',"Cote d'Ivoire":'ci','Croatia':'hr','Cuba':'cu','Cyprus':'cy',
      'Czech Republic':'cz','Denmark':'dk','Djibouti':'dj','Dominican Republic':'do','DRC':'cd',
      'Ecuador':'ec','Egypt':'eg','El Salvador':'sv','Equatorial Guinea':'gq','Eritrea':'er',
      'Estonia':'ee','Eswatini':'sz','Ethiopia':'et','Fiji':'fj','Finland':'fi','France':'fr',
      'Gabon':'ga','Gambia':'gm','Georgia':'ge','Germany':'de','Ghana':'gh','Greece':'gr',
      'Guatemala':'gt','Guinea':'gn','Guinea-Bissau':'gw','Guyana':'gy','Haiti':'ht','Honduras':'hn',
      'Hong Kong':'hk','Hungary':'hu','Iceland':'is','India':'in','Indonesia':'id','Iran':'ir',
      'Iraq':'iq','Ireland':'ie','Israel':'il','Italy':'it','Jamaica':'jm','Japan':'jp',
      'Jordan':'jo','Kazakhstan':'kz','Kenya':'ke','Kosovo':'xk','Kuwait':'kw','Kyrgyzstan':'kg',
      'Laos':'la','Latvia':'lv','Lebanon':'lb','Lesotho':'ls','Liberia':'lr','Libya':'ly',
      'Lithuania':'lt','Luxembourg':'lu','Madagascar':'mg','Malawi':'mw','Malaysia':'my','Mali':'ml',
      'Mauritania':'mr','Mauritius':'mu','Mexico':'mx','Moldova':'md','Mongolia':'mn','Montenegro':'me',
      'Morocco':'ma','Mozambique':'mz','Myanmar':'mm','Namibia':'na','Nepal':'np','Netherlands':'nl',
      'New Zealand':'nz','Nicaragua':'ni','Niger':'ne','Nigeria':'ng','North Macedonia':'mk','Oman':'om',
      'Pakistan':'pk','Palestine':'ps','Panama':'pa','Papua New Guinea':'pg','Paraguay':'py','Peru':'pe',
      'Philippines':'ph','Poland':'pl','Portugal':'pt','Qatar':'qa','Romania':'ro','Russia':'ru',
      'Rwanda':'rw','Saudi Arabia':'sa','Senegal':'sn','Serbia':'rs','Sierra Leone':'sl','Singapore':'sg',
      'Slovakia':'sk','Slovenia':'si','Somalia':'so','South Africa':'za','South Korea':'kr','South Sudan':'ss',
      'Spain':'es','Sri Lanka':'lk','Sudan':'sd','Suriname':'sr','Sweden':'se','Switzerland':'ch',
      'Syria':'sy','Taiwan':'tw','Tajikistan':'tj','Tanzania':'tz','Thailand':'th','Togo':'tg',
      'Trinidad':'tt','Tunisia':'tn','Turkey':'tr','Turkmenistan':'tm','UAE':'ae','Uganda':'ug',
      'Ukraine':'ua','United Kingdom':'gb','United States':'us','Uruguay':'uy','Uzbekistan':'uz',
      'Venezuela':'ve','Vietnam':'vn','Yemen':'ye','Zambia':'zm','Zimbabwe':'zw',
      'Republic of Djibouti':'dj','Republic of Moldova':'md'
    };

    const getFlagCode = (loc) => {
      if (!loc) return null;
      if (loc.regionType === 'usa_state') return 'us';
      if (loc.regionType === 'canada_province') return 'ca';
      return COUNTRY_ISO[loc.name] || COUNTRY_ISO[loc.country] || null;
    };

    // ─── Flag Image Component (renders real flag images from flagcdn.com) ───
    const RegionFlag = ({ loc, size = 18 }) => {
      const code = getFlagCode(loc);
      const [err, setErr] = useState(false);
      if (!code || err) {
        // Fallback: globe icon SVG
        return (
          <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="var(--text-3)" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" style={{ flexShrink:0 }}>
            <circle cx="12" cy="12" r="10"/><path d="M2 12h20"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
          </svg>
        );
      }
      const w = Math.round(size * 1.5);
      return (
        <img
          src={`https://flagcdn.com/w40/${code}.png`}

    // ─── State Badge (for USA states showing abbreviation) ───
    const StateBadge = ({ code, size = 18 }) => (

      </div>

    // ─── Province Badge (for Canadian provinces) ───
    const ProvBadge = ({ name, size = 18 }) => (
      <div style={{ width: size * 1.5, height: size, borderRadius: 3, background: 'rgba(248,113,113,0.08)', border: '1px solid rgba(248,113,113,0.15)', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>

      </div>
    );

    // ─── Composite Flag Renderer: flag image + optional badge ───
    const FlagDisplay = ({ loc, size = 16 }) => {
      if (!loc) return <RegionFlag loc={null} size={size} />;
      if (loc.regionType === 'usa_state') {
        return (
          <div style={{ display:'flex', alignItems:'center', gap:4 }}>
            <RegionFlag loc={loc} size={size} />
            <StateBadge code={loc.code} size={size} />
          </div>
        );
      }
      if (loc.regionType === 'canada_province') {
        return (
          <div style={{ display:'flex', alignItems:'center', gap:4 }}>
            <RegionFlag loc={loc} size={size} />
            <ProvBadge name={loc.name} size={size} />
          </div>
        );
      }
      return <RegionFlag loc={loc} size={size} />;
    };

    // ─── Hierarchical Raw Text Copy-Paste Response Generator ───
    const isListItem = (str) => {
      if (!str) return false;
      return /^\s*([A-Za-z0-9]+[\.\\)]|[-•*])\s*/.test(str.trim());
    };

    const generateRawResponse = (loc) => {
      if (!loc) return '';
      let text = `${loc.name}\n${loc.generalReq || ''}\n\n`;
      if (loc.raw && loc.raw.requirements) {
        loc.raw.requirements.forEach(sec => {
          const secName = sec.section || '';
          const isGeneral = secName.toLowerCase().startsWith('general requirements');
          if (!isGeneral) {
            text += `${secName}\n`;
          }
          const isSecNumbered = /^\s*\d+[\.\s]/.test(secName);
          const itemIndent = isSecNumbered ? '\t' : '';
          (sec.items || []).forEach(it => {
            text += `${itemIndent}${it.name}\n`;
            let hasDesc = false;
            if (it.description && it.description.trim()) {
              hasDesc = true;
              const desc = it.description.trim();
              if (isListItem(desc)) {
                text += `${itemIndent}${desc}\n`;
              } else {
                text += `${itemIndent}\t${desc}\n`;
              }
            }
            if (it.issuedBy && it.issuedBy.trim()) {
              const issued = it.issuedBy.trim();
              if (hasDesc) {
                const desc = it.description.trim();
                if (isListItem(desc)) {
                  text += `${itemIndent}\t${issued}\n`;
                } else {
                  text += `${itemIndent}\t\t${issued}\n`;
                }
              } else {
                text += `${itemIndent}\t${issued}\n`;
              }
            }
          });
          text += `\n`;
        });
      }
      return text.trim() + '\n';
    };

    const buildRequirements = (item, accType) => {
      const sections = item.requirements || [];

      const allDocs = [];
      sections.forEach(s => (s.items || []).forEach(it => allDocs.push({ name: it.name, desc: it.description, issuedBy: it.issuedBy, section: s.section })));
      let summary = `Requirements for ${item.name} (${accType}).`;
      let docs = [];
      let docsWithMeta = [];
      let licenses = roles.acceptable && roles.acceptable.length > 0 ? roles.acceptable : [];
      let tax = [];
      let forms = [];
      let notes = [];
      const isDomestic = item.type === 'usa' || item.type === 'canada';
      const lo = s => (s || '').toLowerCase();
      const bidCardItems = allDocs.filter(d => lo(d.name).includes('bid card') || (lo(d.section).includes('general') && lo(d.name).includes('bid')));
      if (isDomestic) {
        if (accType === 'dealer') {
          summary = `Dealer licensing requirements for ${item.name}. ${item.generalReq || ''}`;
          docs = allDocs.filter(d => lo(d.name).includes('dealer') || lo(d.name).includes('dismantler') || lo(d.name).includes('rebuilder') || lo(d.section).includes('operational')).map(d => d.name);
          docs.unshift("Government-issued photo ID (Passport or Driver's License)");
          if (bidCardItems.length > 0) {
            const bidNames = bidCardItems.map(b => '\u26A0\uFE0F BID CARD REQUIRED: ' + b.name);
            docs = [...bidNames, ...docs];
          }
          tax = allDocs.filter(d => lo(d.name).includes('sales tax') || lo(d.section).includes('tax') || lo(d.name).includes('resale')).map(d => d.name);
          forms = allDocs.filter(d => lo(d.name).includes('form') || lo(d.name).includes('affidavit') || lo(d.section).includes('form')).map(d => d.name);
          notes = [`Verify dealer status with ${item.name} motor vehicle authority.`, "Check sales tax certificate matches company details."];
        } else if (accType === 'business') {
          summary = `Business licensing requirements for ${item.name}. ${item.generalReq || ''}`;
          docs = allDocs.filter(d => lo(d.name).includes('business') || lo(d.name).includes('occupational') || lo(d.name).includes('license') || lo(d.section).includes('business')).map(d => d.name);
          docs.unshift("Government-issued photo ID (Passport or Driver's License)");
          tax = allDocs.filter(d => lo(d.name).includes('sales tax') || lo(d.section).includes('tax')).map(d => d.name);
          notes = ["Confirm active business registration.", "Verify registered agent credentials."];
        } else if (accType === 'broker') {
          summary = `Broker requirements for ${item.name}. Non-licensed members can bid via authorized brokers.`;
          docs = ["Government-issued photo ID (Passport or Driver's License)", "Broker Terms Agreement Signature Page", "Limited Power of Attorney (if bidding via delegate)"];
          notes = [`Check active brokers in ${item.name}.`];
        } else if (accType === 'individual') {
          summary = `Individual buyer requirements for ${item.name}. Restricted salvage inventory access.`;
          docs = allDocs.filter(d => lo(d.name).includes('photo id') || lo(d.name).includes('driver') || lo(d.name).includes('passport')).map(d => d.name);
          if (!docs.length) docs = ["Government-issued photo ID (Driver's License or Passport)"];
          notes = [`Verify individual retail bidding rules in ${item.name}.`];
        } else {
          summary = `International member guidelines for bidding in ${item.name}.`;
          docs = ["Valid passport (signature and photo page)", "Foreign Business Register certificate", "Certified English translations of all documents", "Sales Tax Exemption forms"];
          notes = ["Cross-reference trade names across registers.", "Ensure translations are notarized."];

        timers.push(setTimeout(() => setPhase(4), 1800));
        timers.push(setTimeout(() => setPhase(5), 2300));
        timers.push(setTimeout(() => setPhase(6), 2600));
        return () => timers.forEach(clearTimeout);

        if (dismissed.current) return;
        dismissed.current = true;
        setPhase(7);

        if (particlesRef.current) {

        }
        setTimeout(() => onDone(), 600);
      }, [onDone]);

      /* Intro only dismisses via the explicit button click — no global listeners */

      useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        const w = window.innerWidth;
        const h = window.innerHeight;
        canvas.width = w;
        canvas.height = h;
        const particles = [];
        for (let i = 0; i < 70; i++) {
          particles.push({
            x: Math.random() * w, y: Math.random() * h,
            vx: (Math.random() - 0.3) * 0.3, vy: (Math.random() - 0.3) * 0.2,
            opacity: 0.15 + Math.random() * 0.25, size: 1.5 + Math.random() * 0.8,
          });
        }
        particlesRef.current = particles;
        const draw = () => {
          ctx.clearRect(0, 0, w, h);
          particles.forEach(p => {
            p.x += p.vx; p.y += p.vy;
            if (p.x < 0) p.x = w; if (p.x > w) p.x = 0;
            if (p.y < 0) p.y = h; if (p.y > h) p.y = 0;
            ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(255,255,255,${p.opacity})`; ctx.fill();

        };

        return () => { if (animFrameRef.current) cancelAnimationFrame(animFrameRef.current); };

    // ─── Angular distance filter ───
    const angularDistance = (lat1, lng1, lat2, lng2) => {
      const toRad = d => d * Math.PI / 180;
      const dLat = toRad(lat2 - lat1);
      const dLng = toRad(lng2 - lng1);
      const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLng/2)**2;
      return 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a)) * 180 / Math.PI;
    };
    const filterOverlappingLabels = (labels, minDeg) => {
      const sorted = [...labels].sort((a, b) => {
        const typeA = a.loc ? a.loc.regionType : '';
        const typeB = b.loc ? b.loc.regionType : '';
        const isPriorityA = typeA === 'usa_state' || typeA === 'canada_province';
        const isPriorityB = typeB === 'usa_state' || typeB === 'canada_province';
        if (isPriorityA && !isPriorityB) return -1;
        if (!isPriorityA && isPriorityB) return 1;
        return (b.text || '').length - (a.text || '').length;
      });
      const kept = [];
      for (const lb of sorted) {
        let tooClose = false;
        for (const k of kept) { if (angularDistance(lb.lat, lb.lng, k.lat, k.lng) < minDeg) { tooClose = true; break; } }
        if (!tooClose) kept.push(lb);
      }
      return kept;
    };

      selectRegion
    }) => (
      <div style={{ width, height:'100%', flexShrink:0, display:'flex', flexDirection:'column', overflow:'hidden', position:'relative', background: view === 'list' ? 'var(--surface)' : 'transparent', borderRight: view === 'list' ? '1px solid var(--border)' : 'none' }}>
        <SidebarShimmer />
        
        {/* Glassmorphic Sticky Header */}
        <div style={{ position:'absolute', top:0, left:0, right:0, zIndex:10, background:'rgba(10,15,30,0.7)', backdropFilter:'blur(12px) saturate(180%)', WebkitBackdropFilter:'blur(12px) saturate(180%)', borderBottom:'1px solid var(--border)', padding:'14px 20px 10px' }}>
          <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:10 }}>
            <span style={{ fontSize:11, fontWeight:600, letterSpacing:'0.06em', textTransform:'uppercase', color:'var(--text-3)' }}>Region Explorer</span>
            <span style={{ fontSize:10, fontWeight:500, color:'var(--text-3)', background:'var(--card)', border:'1px solid var(--border-strong)', borderRadius:'var(--radius-pill)', padding:'2px 7px' }}>{filtered.length}</span>
          </div>
          {showSearch && (
            <div style={{ position:'relative', marginBottom:8 }}>
              <Search style={{ position:'absolute', left:10, top:'50%', transform:'translateY(-50%)', width:13, height:13, color:'var(--text-3)' }} />
              <input type="text" value={query} onChange={e => setQuery(e.target.value)} placeholder="Filter regions..."
                style={{ width:'100%', background:'var(--card)', border:'1px solid var(--border)', borderRadius:'var(--radius-input)', padding:'8px 12px 8px 32px', fontSize:12, fontWeight:500, color:'var(--text-1)', outline:'none', transition:'all 0.18s ease', fontFamily:'var(--font-sans)' }}
                onFocus={e => { e.target.style.borderColor = 'var(--accent)'; e.target.style.boxShadow = '0 0 0 3px var(--accent-glow)'; }}
                onBlur={e => { e.target.style.borderColor = 'var(--border)'; e.target.style.boxShadow = 'none'; }}
              />
            </div>
          )}
          <div style={{ display:'flex', gap:4 }}>
            {tabs.map(t => {
              const isActive = filter === t.id;
              return (
                <button key={t.id} onClick={() => setFilter(t.id)}
                  style={{ flex:1, padding:'6px 4px', borderRadius:6, fontSize:11, fontWeight:500, border: isActive ? '1px solid rgba(34,211,238,0.2)' : '1px solid transparent', cursor:'pointer', transition:'all 0.18s cubic-bezier(0.22,1,0.36,1)', background: isActive ? 'var(--accent-dim)' : 'transparent', color: isActive ? 'var(--accent)' : 'var(--text-3)', display:'flex', alignItems:'center', justifyContent:'center', gap:3 }}>
                  {t.label}
                  <span style={{ fontSize:9, color: isActive ? 'var(--accent)' : 'var(--text-4)', fontWeight:400 }}>({tabCounts[t.id]})</span>
                </button>
              );
            })}
          </div>
        </div>

        {/* Region list */}
        <div style={{ flex:1, overflowY:'auto', padding:'120px 8px 8px 8px' }}>
          {filtered.length === 0 ? (
            <div style={{ textAlign:'center', padding:'48px 20px', color:'var(--text-3)', fontSize:13, fontWeight:500, lineHeight:1.5 }}>
              No regions found.<br/>Try a state, province, or country name.
            </div>
          ) : filtered.map((loc, idx) => {
            const isSel = selId === loc.id;
            const delay = Math.min(idx * 18, 320);
            return (
              <div key={loc.id} onClick={() => selectRegion(loc)}
                style={{
                  padding: isSel ? '10px 16px 10px 20px' : '10px 16px',
                  borderRadius: 10, display:'flex', alignItems:'center', justifyContent:'space-between',
                  cursor:'pointer', transition:'all 0.18s cubic-bezier(0.22,1,0.36,1)', marginBottom:2,
                  background: isSel ? 'var(--card-active)' : 'transparent',
                  borderLeft: isSel ? '3px solid var(--accent)' : '3px solid transparent',
                  animation: `fade-in 0.3s ease ${delay}ms both`,
                }}
                onMouseEnter={e => { if (!isSel) { e.currentTarget.style.background='var(--card-hover)'; e.currentTarget.style.paddingLeft='20px'; e.currentTarget.style.borderLeft='3px solid var(--accent)'; }}}
                onMouseLeave={e => { if (!isSel) { e.currentTarget.style.background='transparent'; e.currentTarget.style.paddingLeft='16px'; e.currentTarget.style.borderLeft='3px solid transparent'; }}}>
                <div style={{ display:'flex', alignItems:'center', gap:10 }}>
                  <FlagDisplay loc={loc} size={16} />
                  <div>
                    <div style={{ fontSize:13, fontWeight: isSel ? 600 : 500, color: isSel ? 'var(--accent)' : 'var(--text-1)', lineHeight:1.3 }}>{loc.name}</div>
                    <div style={{ fontSize:11, color:'var(--text-3)', marginTop:1, fontWeight:400 }}>{regionLabel(loc.regionType)}</div>
                  </div>
                </div>
                <div style={{ display:'flex', alignItems:'center', gap:6 }}>
                  {isSel && <span style={{ width:5, height:5, borderRadius:'50%', background:'var(--accent)', boxShadow:'0 0 8px var(--accent)' }} />}
                  <ChevronRight style={{ width:12, height:12, color: isSel ? 'var(--accent)' : 'var(--text-4)', transition:'all 0.15s', opacity: isSel ? 1 : 0.5, flexShrink:0 }} />
                </div>
              </div>
            );
          })}
        </div>
      </div>
    );

    // ─── Mobile Detail Sheet Component ───
    const MobileDetailSheet = ({ isMobile, mobileDetailOpen, setMobileDetailOpen, selected, notify, copiedKey }) => {
      if (!isMobile || !mobileDetailOpen || !selected) return null;
      return (
        <>
          <div className="mobile-detail-overlay" onClick={() => setMobileDetailOpen(false)} />
          <div className="mobile-detail-sheet">
            <div style={{ padding:'12px 20px 8px', borderBottom:'1px solid var(--border)', display:'flex', alignItems:'center', justifyContent:'space-between', flexShrink:0 }}>
              <div style={{ display:'flex', alignItems:'center', gap:8 }}>
                <FlagDisplay loc={selected} size={18} />
                <span style={{ fontSize:16, fontWeight:600, color:'var(--text-1)' }}>{selected.name}</span>
              </div>
              <button onClick={() => setMobileDetailOpen(false)}
                style={{ width:32, height:32, borderRadius:8, background:'var(--card)', border:'1px solid var(--border)', cursor:'pointer', color:'var(--text-3)', display:'flex', alignItems:'center', justifyContent:'center' }}>
                <X style={{ width:16, height:16 }} />
              </button>
            </div>
            <div style={{ flex:1, overflow:'hidden' }}>
              <DetailPanel loc={selected} notify={notify} copiedKey={copiedKey} onClose={() => setMobileDetailOpen(false)} />
            </div>
          </div>
        </>
      );
    };

    const App = () => {
      const isMobile = useIsMobile();
      const [view, setView] = useState(() => window.innerWidth <= 768 ? 'list' : 'globe');
      const [filter, setFilter] = useState('all');
      const [query, setQuery] = useState('');
      const [selId, setSelId] = useState(null);
      const [toast, setToast] = useState('');
      const [copiedKey, setCopiedKey] = useState('');
      const [showIntro, setShowIntro] = useState(true);
      const [mobileDetailOpen, setMobileDetailOpen] = useState(false);
      const globeContainerRef = useRef(null);
      const globeRef = useRef(null);
      const searchRef = useRef(null);
      const [polys, setPolys] = useState([]);

      const allLocs = useMemo(buildLocations, []);

      useEffect(() => {
        const u = allLocs.filter(l => l.regionType === 'usa_state').length;
        const c = allLocs.filter(l => l.regionType === 'canada_province').length;
        const i = allLocs.filter(l => l.regionType === 'international_country').length;
        console.log(`%cCopart Licensing Database: ${allLocs.length} regions (${u} USA, ${c} Canada, ${i} International)`, 'color:#22D3EE;font-weight:600');
      }, [allLocs]);

      const selected = useMemo(() => selId ? allLocs.find(l => l.id === selId) || null : null, [allLocs, selId]);

      const filtered = useMemo(() => {
        let r = allLocs;
        if (filter !== 'all') r = r.filter(l => l.regionType === filter);
        const q = query.toLowerCase().trim();
        if (q) {
          r = r.filter(l => {
            // 1. Direct name, code, or country match
            if (l.name.toLowerCase().includes(q) || l.code.toLowerCase().includes(q) || (l.country && l.country.toLowerCase().includes(q))) return true;

            // 2. Official link titles & URLs (DMV Names)
            if (l.officialLinks && l.officialLinks.some(lnk => lnk.title.toLowerCase().includes(q) || lnk.url.toLowerCase().includes(q))) return true;

            // 3. Raw requirements (DMV authorities, requirement titles, descriptions)
            if (l.raw && l.raw.requirements) {
              const reqMatch = l.raw.requirements.some(sec =>
                (sec.section || '').toLowerCase().includes(q) ||
                (sec.items || []).some(it =>
                  (it.name || '').toLowerCase().includes(q) ||
                  (it.description || '').toLowerCase().includes(q) ||
                  (it.issuedBy || '').toLowerCase().includes(q)
                )
              );
              if (reqMatch) return true;
            }

            // 4. Checklist document requirements
            if (l.raw && l.raw.checklist) {
              const checkMatch = Object.values(l.raw.checklist).some(arr =>
                Array.isArray(arr) && arr.some(item => (item || '').toLowerCase().includes(q))
              );
              if (checkMatch) return true;
            }

            // 5. Permitted Signer Roles
            if (l.raw && l.raw.permittedRoles) {
              const roleMatch = Object.values(l.raw.permittedRoles).some(arr =>
                Array.isArray(arr) && arr.some(role => (role || '').toLowerCase().includes(q))
              );
              if (roleMatch) return true;
            }

            return false;
          });
        }
        return r;
      }, [allLocs, filter, query]);

      const tabCounts = useMemo(() => ({
        all: allLocs.length,
        usa_state: allLocs.filter(l => l.regionType === 'usa_state').length,
        canada_province: allLocs.filter(l => l.regionType === 'canada_province').length,
        international_country: allLocs.filter(l => l.regionType === 'international_country').length,
      }), [allLocs]);

      const notify = useCallback((msg, key = '') => {
        setToast(msg); setCopiedKey(key);
        setTimeout(() => { setToast(''); setCopiedKey(''); }, 1800);
      }, []);

      const selectRegion = useCallback((loc) => {
        if (!loc) return;
        setSelId(loc.id);
        window.location.hash = `/region/${loc.id}`;
        if (isMobile) setMobileDetailOpen(true);
        if (globeRef.current) {
          globeRef.current.controls().autoRotate = false;
          const lat = loc.center?.lat || loc.lat || (loc.raw && loc.raw.lat);
          const lng = loc.center?.lng || loc.lng || (loc.raw && loc.raw.lng);
          if (lat && lng) {
            globeRef.current.pointOfView({ lat, lng, altitude: 1.8 }, 1400);
          }
        }
      }, [isMobile]);

      // Restore region from URL hash on load
      useEffect(() => {
        const hash = window.location.hash;
        if (hash.startsWith('#/region/')) {
          const id = hash.replace('#/region/', '');
          const loc = allLocs.find(l => l.id === id);
          if (loc) {
            setSelId(loc.id);
            setShowIntro(false);
          }
        }
        const onHashChange = () => {
          const h = window.location.hash;
          if (h.startsWith('#/region/')) {
            const id = h.replace('#/region/', '');
            const loc = allLocs.find(l => l.id === id);
            if (loc) setSelId(loc.id);
          }
        };
        window.addEventListener('hashchange', onHashChange);
        return () => window.removeEventListener('hashchange', onHashChange);
      }, [allLocs]);

      useEffect(() => {
        const handler = (e) => { if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); const inp = document.querySelector('input[placeholder*="Search"], input[placeholder*="Filter"]'); inp?.focus(); } };
        window.addEventListener('keydown', handler);
        return () => window.removeEventListener('keydown', handler);
      }, []);

      // ─── GeoJSON (embedded at build time) ───
      useEffect(() => {
        try {
          const world = window.WORLD_GEO || { features: [] };
          const us = window.US_GEO || { features: [] };
          const ca = window.CA_GEO || { features: [] };
          const norm = n => n.toLowerCase().replace(/[^a-z0-9]/g, '');
          const worldF = world.features.filter(f => {
            const n = f.properties.name || f.properties.ADMIN || '';
            return !n.includes('United States') && !n.includes('America') && n !== 'Canada';
          }).map(f => {
            const n = f.properties.name || f.properties.ADMIN || '';
            return { ...f, properties: { ...f.properties, name: n, _polyType: 'world', match: allLocs.find(l => l.regionType === 'international_country' && norm(l.name) === norm(n)) } };
          });
          const usF = us.features.map(f => ({ ...f, properties: { ...f.properties, _polyType: 'us', match: allLocs.find(l => l.regionType === 'usa_state' && norm(l.name) === norm(f.properties.name)) } }));
          const caF = ca.features.map(f => ({ ...f, properties: { ...f.properties, _polyType: 'ca', match: allLocs.find(l => l.regionType === 'canada_province' && norm(l.name) === norm(f.properties.name)) } }));
          const all = [...worldF, ...usF, ...caF];
          console.log(`%cGeoJSON loaded: ${all.length} polygons (${worldF.length} world, ${usF.length} US, ${caF.length} CA)`, 'color:#34D399;font-weight:600');
          setPolys(all);
        } catch (err) {
          console.error('GeoJSON processing failed:', err);
        }
      }, [allLocs]);

      // ─── Globe Init ───
      useEffect(() => {
        if (view !== 'globe' || !globeContainerRef.current) return;
        const el = globeContainerRef.current;
        const g = window.Globe()(el)
          .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg')
          .bumpImageUrl('https://unpkg.com/three-globe/example/img/earth-topology.png')
          .backgroundImageUrl('')
          .showAtmosphere(true)
          .atmosphereColor('rgba(34,211,238,0.28)')
          .atmosphereAltitude(0.15)
          .showGraticules(true)
          .width(el.clientWidth)
          .height(el.clientHeight);

        globeRef.current = g;

        const mat = g.globeMaterial();
        mat.bumpScale = 10;
        mat.shininess = 3;
        mat.specular = new window.THREE.Color('#081820');
        mat.emissive = new window.THREE.Color('#000000');
        mat.emissiveIntensity = 0;

        new window.THREE.TextureLoader().load('https://unpkg.com/three-globe/example/img/earth-water.png', tex => { mat.specularMap = tex; });

        setTimeout(() => {
          g.lights().forEach(l => {
            if (l.type === 'DirectionalLight') { l.position.set(1.5, 2, 1); l.intensity = 1.4; }
            else if (l.type === 'AmbientLight') { l.intensity = 0.65; }
          });
          const fillLight = new window.THREE.DirectionalLight('#22D3EE', 0.25);
          fillLight.position.set(-2, -1, -1);
          g.scene().add(fillLight);

          // Style graticules
          const gratMat = g.scene().children.find(c => c.type === 'Line');
          if (gratMat && gratMat.material) {
            gratMat.material.color = new window.THREE.Color('rgba(255,255,255,0.04)');
            gratMat.material.opacity = 0.04;
            gratMat.material.transparent = true;
          }
        }, 100);

        g.controls().autoRotate = true;
        g.controls().autoRotateSpeed = 0.25;
        g.controls().enableZoom = true;
        g.controls().enableDamping = true;
        g.controls().dampingFactor = 0.12;
        g.controls().addEventListener('start', () => { g.controls().autoRotate = false; });

        g.arcsData(ARC_DATA)
          .arcColor(() => 'rgba(34,211,238,0.18)')
          .arcStroke(0.4)
          .arcAltitudeAutoScale(0.25)
          .arcDashLength(0.35)
          .arcDashGap(4)
          .arcDashAnimateTime(5000);

        const onResize = () => { if (el && g) { g.width(el.clientWidth); g.height(el.clientHeight); } };
        window.addEventListener('resize', onResize);
        return () => { window.removeEventListener('resize', onResize); if (el) el.innerHTML = ''; };
      }, [view]);

      // ─── Polygon Layer ───
      useEffect(() => {
        const g = globeRef.current;
        if (!g || !polys.length || view !== 'globe') return;
        g.polygonsData(polys)
          .polygonCapColor(d => {
            if (selected && d.properties.match && selected.id === d.properties.match.id) return 'rgba(34,211,238,0.08)';
            return 'rgba(0,0,0,0)';
          })
          .polygonStrokeColor(d => {
            const pt = d.properties._polyType;
            if (selected && d.properties.match && selected.id === d.properties.match.id) return '#22D3EE';
            if (pt === 'us') return 'rgba(34, 211, 238, 0.45)';
            if (pt === 'ca') return 'rgba(34, 211, 238, 0.40)';
            if (d.properties.match) return 'rgba(148, 220, 255, 0.45)';
            return 'rgba(255,255,255,0.08)';
          })
          .polygonSideColor(() => 'rgba(0,0,0,0)')
          .polygonAltitude(d => {
            if (selected && d.properties.match && selected.id === d.properties.match.id) return 0.012;
            return 0.001;
          })
          .polygonLabel(d => {
            if (!d.properties.match) return null;
            const m = d.properties.match;
            return `<div class="globe-tooltip"><div>${m.name}</div><div class="tt-type">${regionLabel(m.regionType)}</div></div>`;
          })
          .onPolygonClick(p => { if (p.properties.match) selectRegion(p.properties.match); })
          .onPolygonHover(p => {
            if (p && p.properties.match) {
              g.polygonCapColor(d => {
                if (selected && d.properties.match && selected.id === d.properties.match.id) return 'rgba(34,211,238,0.08)';
                if (d === p && d.properties.match) return 'rgba(34,211,238,0.06)';
                return 'rgba(0,0,0,0)';
              });
            } else {
              g.polygonCapColor(d => {
                if (selected && d.properties.match && selected.id === d.properties.match.id) return 'rgba(34,211,238,0.08)';
                return 'rgba(0,0,0,0)';
              });
            }
          });
      }, [polys, selected, view, selectRegion]);

      // ─── Selected Point Marker + Rings ───
      useEffect(() => {
        const g = globeRef.current;
        if (!g || view !== 'globe') return;
        if (selected && selected.center && selected.center.lat !== 0) {
          g.ringsData([{ lat: selected.center.lat, lng: selected.center.lng }])
           .ringColor(() => 'rgba(34, 211, 238, 0.85)')
           .ringMaxRadius(3)
           .ringPropagationSpeed(2.5);
          g.pointsData([{ lat: selected.center.lat, lng: selected.center.lng }])
           .pointColor(() => '#22D3EE')
           .pointAltitude(0.02)
           .pointRadius(0.4)
           .pointsMerge(false);
        } else {
          g.ringsData([]);
          g.pointsData([]);
        }
      }, [selected, view]);

      // ─── Label Layer ───
      useEffect(() => {
        const g = globeRef.current;
        if (!g || view !== 'globe') return;
        const pov = g.pointOfView();
        const altitude = pov ? pov.altitude : 2.5;
        const rawLabels = filtered.filter(l => l.center.lat !== 0).map(l => {
          const isIntl = l.regionType === 'international_country';
          if (isIntl && altitude > 2.5) return null;
          return {
            lat: l.center.lat, lng: l.center.lng,
            text: l.regionType === 'usa_state' ? l.code : l.regionType === 'canada_province' ? getProvCode(l.name) : l.name,
            color: 'rgba(255,255,255,0.8)',
            size: l.regionType === 'usa_state' ? 0.72 : l.regionType === 'canada_province' ? 0.68 : 0.42,
            loc: l
          };
        }).filter(Boolean);
        const labels = filterOverlappingLabels(rawLabels, 1.0);
        g.labelsData(labels)
          .labelLat('lat').labelLng('lng').labelText('text')
          .labelColor('color').labelSize('size')
          .labelDotRadius(0).labelAltitude(0.018).labelResolution(4)
          .onLabelClick(lb => { if (lb.loc) selectRegion(lb.loc); });
      }, [filtered, view, selectRegion]);

      // ─── Tabs ───
      const tabs = [
        { id: 'all', label: 'All' },
        { id: 'usa_state', label: 'USA' },
        { id: 'canada_province', label: 'Canada' },
        { id: 'international_country', label: "Int'l" }
      ];

      const viewModes = [
        { id: 'globe', label: 'Globe', I: Globe2 },
        { id: 'list', label: 'List', I: List }
      ];

      return (
        <>
        {showIntro && <IntroOverlay onDone={() => setShowIntro(false)} />}
        <MobileDetailSheet isMobile={isMobile} mobileDetailOpen={mobileDetailOpen} setMobileDetailOpen={setMobileDetailOpen} selected={selected} notify={notify} copiedKey={copiedKey} />
        <div style={{ flex:1, width:'100%', height: isMobile ? 'auto' : '100%', minHeight: isMobile ? '100vh' : undefined, display:'flex', flexDirection:'column', position:'relative', fontFamily:'var(--font-sans)' }}>

          {/* Toast */}
          <AnimatePresence>
            {toast && (
              <motion.div initial={{ opacity:0, y:16 }} animate={{ opacity:1, y:0 }} exit={{ opacity:0, y:16 }} transition={spring}
                style={{ position:'fixed', bottom:32, left:'50%', transform:'translateX(-50%)', zIndex:999, background:'rgba(13,18,32,0.95)', border:'1px solid rgba(34,211,238,0.25)', borderRadius:'var(--radius-pill)', padding:'10px 20px', display:'flex', alignItems:'center', gap:8, boxShadow:'0 16px 48px rgba(0,0,0,0.4)', backdropFilter:'blur(16px)' }}>
                <Check style={{ width:14, height:14, color:'var(--success)', strokeWidth:3 }} />
                <span style={{ fontSize:13, fontWeight:500, color:'var(--text-1)' }}>{toast}</span>
              </motion.div>
            )}
          </AnimatePresence>

          {/* ═══ Navbar ═══ */}
          {isMobile ? (
            <header style={{ flexShrink:0, zIndex:30, borderBottom:'1px solid var(--border)', background:'var(--bg)' }}>
              {/* Top row: Logo + View toggle */}
              <div style={{ height:48, padding:'0 16px', display:'flex', alignItems:'center', justifyContent:'space-between' }}>
                <div style={{ display:'flex', alignItems:'center', gap:8, cursor:'pointer' }} onClick={() => { setView('list'); setSelId(null); }}>
                  <CopartLogo height={22} />
                  <span style={{ fontFamily:'var(--font-mono)', fontSize:9, letterSpacing:'0.06em', color:'var(--text-3)', textTransform:'uppercase', fontWeight:500 }}>Licensing</span>
                </div>
                <div style={{ display:'flex', alignItems:'center', gap:4 }}>
                  <div style={{ display:'flex', alignItems:'center', border:'1px solid var(--border-strong)', borderRadius:6, overflow:'hidden' }}>
                    {viewModes.filter(t => t.id !== 'globe').map((t, i) => (
                      <React.Fragment key={t.id}>
                        {i > 0 && <div style={{ width:1, height:16, background:'var(--border-strong)' }} />}
                        <button onClick={() => setView(t.id)}
                          style={{ padding:'5px 10px', fontSize:11, fontWeight:600, display:'flex', alignItems:'center', gap:4, border:'none', cursor:'pointer', transition:'all 0.15s ease', background: view === t.id ? 'var(--accent-dim)' : 'transparent', color: view === t.id ? 'var(--accent)' : 'var(--text-3)' }}>
                          <t.I style={{ width:11, height:11 }} /> {t.label}
                        </button>
                      </React.Fragment>
                    ))}
                  </div>
                  <span style={{ fontSize:10, color:'var(--text-3)', fontFamily:'var(--font-mono)', fontWeight:500 }}>{allLocs.length}</span>
                </div>
              </div>
              {/* Search row */}
              <div style={{ padding:'0 16px 10px' }}>
                <div style={{ position:'relative' }}>
                  <Search style={{ position:'absolute', left:12, top:'50%', transform:'translateY(-50%)', width:13, height:13, color:'var(--text-3)' }} />
                  <input ref={searchRef} type="text" value={query} onChange={e => setQuery(e.target.value)}

                    onFocus={e => { e.target.style.borderColor = 'var(--accent)'; }}
                    onBlur={e => { e.target.style.borderColor = 'var(--border)'; }}
                  />
                </div>
              </div>
              {/* Filter tabs */}
              <div style={{ padding:'0 12px 8px', display:'flex', gap:4 }}>
                {tabs.map(t => {
                  const isActive = filter === t.id;
                  return (
                    <button key={t.id} onClick={() => setFilter(t.id)}
                      style={{ flex:1, padding:'6px 4px', borderRadius:6, fontSize:11, fontWeight:500, border: isActive ? '1px solid rgba(34,211,238,0.2)' : '1px solid transparent', cursor:'pointer', background: isActive ? 'var(--accent-dim)' : 'transparent', color: isActive ? 'var(--accent)' : 'var(--text-3)', display:'flex', alignItems:'center', justifyContent:'center', gap:3 }}>

            <header style={{ height:56, flexShrink:0, zIndex:30, padding:'0 24px', borderBottom:'1px solid var(--border)', background:'var(--bg)', display:'flex', alignItems:'center', justifyContent:'space-between', gap:16 }}>
              {/* Left: Logo + Label */}
              <div style={{ display:'flex', alignItems:'center', gap:12, cursor:'pointer', flexShrink:0 }} onClick={() => { setView('globe'); setSelId(null); }}>
                <CopartLogo height={28} />
                <div style={{ width:1, height:20, background:'var(--border-strong)' }} />
                <span style={{ fontFamily:'var(--font-mono)', fontSize:11, letterSpacing:'0.08em', color:'var(--text-3)', textTransform:'uppercase', fontWeight:500 }}>Licensing Intelligence</span>
              </div>

              {/* Center: Search */}
              <div style={{ position:'relative', width:'100%', maxWidth:480, flexShrink:1 }}>
                <Search style={{ position:'absolute', left:14, top:'50%', transform:'translateY(-50%)', width:14, height:14, color:'var(--text-3)' }} />
                <input ref={searchRef} type="text" value={query} onChange={e => setQuery(e.target.value)}
                  placeholder={`Search ${allLocs.length} regions...`}
                  style={{ width:'100%', background:'var(--card)', border:'1px solid var(--border)', borderRadius:'var(--radius-input)', padding:'10px 16px 10px 40px', fontSize:13, fontWeight:500, color:'var(--text-1)', outline:'none', transition:'all 0.18s ease', fontFamily:'var(--font-sans)' }}

                />
                <span style={{ position:'absolute', right:12, top:'50%', transform:'translateY(-50%)', fontSize:10, color:'var(--text-4)', fontWeight:500, pointerEvents:'none', border:'1px solid var(--border-strong)', borderRadius:4, padding:'2px 6px', background:'var(--card)', fontFamily:'var(--font-mono)' }}>Ctrl K</span>
              </div>

              {/* Right: View Toggle + Counter */}
              <div style={{ display:'flex', alignItems:'center', gap:12, flexShrink:0 }}>
                <div style={{ display:'flex', alignItems:'center', border:'1px solid var(--border-strong)', borderRadius:8, overflow:'hidden' }}>
                  {viewModes.map((t, i) => (
                    <React.Fragment key={t.id}>
                      {i > 0 && <div style={{ width:1, height:20, background:'var(--border-strong)' }} />}
                      <button onClick={() => setView(t.id)}
                        onMouseDown={e => e.currentTarget.style.transform = 'scale(0.97)'}
                        onMouseUp={e => e.currentTarget.style.transform = 'scale(1)'}
                        style={{ padding:'7px 12px', fontSize:12, fontWeight:600, display:'flex', alignItems:'center', gap:5, border:'none', cursor:'pointer', transition:'all 0.18s ease', background: view === t.id ? 'var(--accent-dim)' : 'transparent', color: view === t.id ? 'var(--accent)' : 'var(--text-3)' }}>
                        <t.I style={{ width:13, height:13 }} /> {t.label}
                      </button>

                <span style={{ fontSize:11, color:'var(--text-3)', fontFamily:'var(--font-mono)', fontWeight:500, whiteSpace:'nowrap' }}>{allLocs.length} regions</span>
              </div>
            </header>

          {/* ═══ Main Area ═══ */}
          <div style={{ flex:1, width:'100%', position:'relative', overflow: isMobile ? 'auto' : 'hidden' }}>

            {/* ─── Globe View (desktop only) ─── */}
            {view === 'globe' && !isMobile && (
              <div style={{ width:'100%', height:'100%', position:'relative', display:'flex' }}>
                <div ref={globeContainerRef} style={{ position:'absolute', inset:0, zIndex:0, cursor:'grab' }} />
                {/* Left Explorer Panel */}
                <div className="panel" style={{ position:'absolute', left:24, top:24, bottom:24, width:340, zIndex:10, display:'flex', flexDirection:'column', overflow:'hidden' }}>
                  <SidebarList width={340} view={view} filtered={filtered} query={query} setQuery={setQuery} filter={filter} setFilter={setFilter} tabs={tabs} tabCounts={tabCounts} selId={selId} selectRegion={selectRegion} />
                </div>
                {/* Right Detail Panel */}
                <div className="panel" style={{ position:'absolute', right:24, top:24, bottom:24, width:440, zIndex:10, display:'flex', flexDirection:'column', overflow:'hidden' }}>
                  {selected ? (
                    <DetailPanel loc={selected} notify={notify} copiedKey={copiedKey} onClose={() => setSelId(null)} />
                  ) : (
                    <div style={{ flex:1, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', padding:40, textAlign:'center' }}>
                      <Compass style={{ width:28, height:28, color:'var(--text-4)', marginBottom:14 }} />
                      <div style={{ fontSize:15, fontWeight:600, color:'var(--text-2)' }}>No Region Selected</div>
                      <div style={{ fontSize:13, color:'var(--text-3)', marginTop:8, maxWidth:240, lineHeight:1.55, fontWeight:400 }}>Select a region to view licensing requirements.</div>
                    </div>
                  )}
                </div>
              </div>
            )}


            {/* ─── List View (Desktop) ─── */}
            {view === 'list' && !isMobile && (
              <div style={{ width:'100%', height:'100%', display:'flex', overflow:'hidden' }}>
                {/* Sidebar */}
                <div style={{ width:320, height:'100%', flexShrink:0, borderRight:'1px solid var(--border)', background:'var(--surface)', backdropFilter:'blur(28px)', display:'flex', flexDirection:'column', position:'relative' }}>
                  <SidebarList width={320} showSearch={true} view={view} filtered={filtered} query={query} setQuery={setQuery} filter={filter} setFilter={setFilter} tabs={tabs} tabCounts={tabCounts} selId={selId} selectRegion={selectRegion} />
                </div>
                {/* Table */}
                <div style={{ flex:1, height:'100%', overflow:'hidden', display:'flex', flexDirection:'column', padding:24 }}>
                  <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:16, flexShrink:0 }}>
                    <div>
                      <div style={{ fontSize:11, fontWeight:600, letterSpacing:'0.06em', textTransform:'uppercase', color:'var(--text-3)', marginBottom:4 }}>Database</div>
                      <div style={{ fontSize:18, fontWeight:600, color:'var(--text-1)', letterSpacing:'-0.01em' }}>Licensing Registry</div>
                    </div>
                    <span style={{ fontSize:13, color:'var(--text-3)', fontWeight:500 }}>{filtered.length} jurisdictions</span>
                  </div>
                  <div style={{ flex:1, overflow:'auto', borderRadius:'var(--radius-panel)', border:'1px solid var(--border)', background:'rgba(13,18,32,0.3)' }}>
                    <table style={{ width:'100%', borderCollapse:'collapse', textAlign:'left', fontSize:13 }}>
                      <thead>
                        <tr style={{ borderBottom:'1px solid var(--border)', position:'sticky', top:0, background:'rgba(13,18,32,0.98)', zIndex:2 }}>
                          {['Region','Type','Country','Docs','Updated',''].map((h, i) => (
                            <th key={i} style={{ padding:'14px 20px', fontSize:11, fontWeight:600, color:'var(--text-3)', textTransform:'uppercase', letterSpacing:'0.06em' }}>{h}</th>
                          ))}
                        </tr>
                      </thead>
                      <tbody>
                        {filtered.map(r => {
                          const dc = (r.raw.requirements || []).reduce((acc, sec) => acc + (sec.items || []).length, 0);
                          return (
                            <tr key={r.id} onClick={() => selectRegion(r)}
                              style={{ borderBottom:'1px solid var(--border)', cursor:'pointer', transition:'background 0.15s ease' }}
                              onMouseEnter={e => e.currentTarget.style.background = 'var(--card-hover)'}
                              onMouseLeave={e => e.currentTarget.style.background = 'transparent'}>
                              <td style={{ padding:'12px 20px', fontWeight:600, color:'var(--text-1)' }}>{r.name}</td>
                              <td style={{ padding:'12px 20px', fontSize:11, fontWeight:600, color:'var(--accent)', textTransform:'uppercase', letterSpacing:'0.03em' }}>{regionLabel(r.regionType)}</td>
                              <td style={{ padding:'12px 20px', color:'var(--text-2)' }}>{r.country}</td>
                              <td style={{ padding:'12px 20px', color:'var(--text-2)', fontFamily:'var(--font-mono)' }}>{dc}</td>
                              <td style={{ padding:'12px 20px', color:'var(--text-3)', fontSize:12 }}>{new Date().toLocaleDateString('en-US', { month: 'short', year: 'numeric' })}</td>
                              <td style={{ padding:'12px 20px', textAlign:'right' }}>
                                <button onClick={e => { e.stopPropagation(); selectRegion(r); }}
                                  style={{ padding:'6px 16px', background:'var(--accent-dim)', border:'1px solid rgba(34,211,238,0.15)', borderRadius:'var(--radius-pill)', fontSize:12, fontWeight:600, color:'var(--accent)', cursor:'pointer', transition:'all 0.18s ease' }}
                                  onMouseEnter={e => { e.currentTarget.style.background = 'var(--accent)'; e.currentTarget.style.color = 'var(--bg)'; }}
                                  onMouseLeave={e => { e.currentTarget.style.background = 'var(--accent-dim)'; e.currentTarget.style.color = 'var(--accent)'; }}>
                                  View
                                </button>
                              </td>
                            </tr>
                          );
                        })}
                      </tbody>
                    </table>
                  </div>
                </div>
                {/* Right Detail */}
                <div style={{ width:420, height:'100%', flexShrink:0, borderLeft:'1px solid var(--border)', background:'rgba(8,12,20,0.9)', backdropFilter:'blur(20px)', display:'flex', flexDirection:'column' }}>
                  {selected ? (
                    <DetailPanel loc={selected} notify={notify} copiedKey={copiedKey} onClose={() => setSelId(null)} />
                  ) : (
                    <div style={{ flex:1, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', padding:40, textAlign:'center' }}>
                      <Compass style={{ width:28, height:28, color:'var(--text-4)', marginBottom:14 }} />
                      <div style={{ fontSize:15, fontWeight:600, color:'var(--text-2)' }}>No Region Selected</div>
                      <div style={{ fontSize:13, color:'var(--text-3)', marginTop:8, maxWidth:240, lineHeight:1.55 }}>Select a region to view licensing requirements.</div>
                    </div>
                  )}
                </div>
              </div>
            )}

            {/* ─── List View (Mobile) ─── */}
            {view === 'list' && isMobile && (
              <div style={{ width:'100%', minHeight:'calc(100vh - 140px)', display:'flex', flexDirection:'column' }}>
                <div style={{ flex:1, overflowY:'auto', padding:'4px 0' }}>
                  {filtered.length === 0 ? (
                    <div style={{ textAlign:'center', padding:'48px 20px', color:'var(--text-3)', fontSize:13 }}>
                      No regions found.
                    </div>
                  ) : filtered.map((loc, idx) => {
                    const isSel = selId === loc.id;
                    return (
                      <div key={loc.id} onClick={() => selectRegion(loc)}
                        style={{
                          padding:'12px 16px', display:'flex', alignItems:'center', justifyContent:'space-between',
                          cursor:'pointer', borderBottom:'1px solid var(--border)',
                          background: isSel ? 'var(--card-active)' : 'transparent',
                        }}>
                        <div style={{ display:'flex', alignItems:'center', gap:12 }}>
                          <FlagDisplay loc={loc} size={18} />
                          <div>
                            <div style={{ fontSize:14, fontWeight: isSel ? 600 : 500, color: isSel ? 'var(--accent)' : 'var(--text-1)', lineHeight:1.3 }}>{loc.name}</div>
                            <div style={{ fontSize:11, color:'var(--text-3)', marginTop:2 }}>{regionLabel(loc.regionType)}</div>
                          </div>
                        </div>
                        <ChevronRight style={{ width:14, height:14, color: isSel ? 'var(--accent)' : 'var(--text-4)', flexShrink:0 }} />
                      </div>
                    );
                  })}
                </div>
              </div>
            )}
          </div>

          {/* Footer */}
          <footer style={{ height: isMobile ? 32 : 36, flexShrink:0, zIndex:30, borderTop:'1px solid var(--border)', background:'var(--bg)', padding: isMobile ? '0 12px' : '0 24px', display:'flex', alignItems:'center', justifyContent:'space-between', fontSize: isMobile ? 9 : 11, color:'var(--text-4)', fontWeight:500, letterSpacing:'0.02em' }}>
            <span>Copart Member Services · Licensing Intelligence</span>
            <span>{isMobile ? '© 2026 Copart' : 'Built by Pratham Thakur · Hyderabad · © 2026 Copart Inc.'}</span>
          </footer>
        </div>
        </>
      );
    };

    // ═══════════════════════════════════════════════════════════════
    // DETAIL PANEL
    // ═══════════════════════════════════════════════════════════════
    const DetailPanel = ({ loc, notify, copiedKey, onClose }) => {
      const rawText = useMemo(() => generateRawResponse(loc), [loc]);

      const hasChecklists = loc.raw && loc.raw.checklist && (
        (loc.raw.checklist.existing && loc.raw.checklist.existing.length > 0) ||
        (loc.raw.checklist.dealers && loc.raw.checklist.dealers.length > 0) ||
        (loc.raw.checklist.nonDealers && loc.raw.checklist.nonDealers.length > 0)
      );

      const hasPermittedRoles = loc.raw && loc.raw.permittedRoles && (
        (loc.raw.permittedRoles.acceptable && loc.raw.permittedRoles.acceptable.length > 0) ||
        (loc.raw.permittedRoles.unacceptable && loc.raw.permittedRoles.unacceptable.length > 0)
      );

      // Bid Card detection
      const bidCardItem = useMemo(() => {
        if (!loc.raw || !loc.raw.requirements) return null;
        for (const sec of loc.raw.requirements) {
          if ((sec.section || '').toLowerCase().includes('general requirements')) {
            for (const it of (sec.items || [])) {
              if ((it.name || '').toLowerCase().includes('bid card')) {
                return it;
              }
            }
          }
        }
        return null;
      }, [loc]);

      const copyResponse = () => {
        navigator.clipboard.writeText(rawText).then(() => notify('Copy paste data copied', 'response'));
      };

      const copyDocs = () => {
        let t = `${loc.name} Licensing Requirements:\n\n`;
        if (loc.raw && loc.raw.requirements) {
          loc.raw.requirements.forEach(sec => {
            t += `${sec.section}:\n`;
            (sec.items || []).forEach(it => {
              t += `- ${it.name}`;
              if (it.description && it.description.trim()) t += ` (${it.description.trim()})`;
              t += '\n';
            });
            t += '\n';
          });
        }
        navigator.clipboard.writeText(t).then(() => notify('Requirements copied', 'docs'));
      };

      const copyLinks = () => {
        let t = '';
        if (loc.officialLinks && loc.officialLinks.length) {
          t += `Official Links for ${loc.name}:\n`;
          loc.officialLinks.forEach(l => t += `- ${l.title}: ${l.url}\n`);
        } else {
          t += 'Official authority links not available in the dataset.\n';
        }
        t += '\nCopart Resources:\n';
        loc.copartLinks.forEach(l => t += `- ${l.title}: ${l.url}\n`);
        navigator.clipboard.writeText(t).then(() => notify('Links copied', 'links'));
      };

      const downloadPdf = () => {
        const w = window.open('', '_blank');
        let reqsHtml = '';
        if (loc.raw && loc.raw.requirements) {
          loc.raw.requirements.forEach(sec => {
            reqsHtml += `<h2>${sec.section}</h2><ul>`;
            (sec.items || []).forEach(it => {
              reqsHtml += `<li><strong>${it.name}</strong>`;
              if (it.description && it.description.trim()) reqsHtml += `<br/><span style="color:#475569;font-size:13px">${it.description}</span>`;
              if (it.issuedBy && it.issuedBy.trim()) reqsHtml += `<br/><span style="color:#64748b;font-size:11px">Authority: ${it.issuedBy}</span>`;
              reqsHtml += `</li>`;
            });
            reqsHtml += `</ul>`;
          });
        }
        let checklistHtml = '';
        if (hasChecklists) {
          checklistHtml += `<h2>Required Documents Checklist</h2>`;
          if (loc.raw.checklist.existing && loc.raw.checklist.existing.length > 0) checklistHtml += `<h3>Existing Members</h3><ul>` + loc.raw.checklist.existing.map(item => `<li>${item}</li>`).join('') + `</ul>`;
          if (loc.raw.checklist.dealers && loc.raw.checklist.dealers.length > 0) checklistHtml += `<h3>Dealers</h3><ul>` + loc.raw.checklist.dealers.map(item => `<li>${item}</li>`).join('') + `</ul>`;
          if (loc.raw.checklist.nonDealers && loc.raw.checklist.nonDealers.length > 0) checklistHtml += `<h3>Non-Dealers</h3><ul>` + loc.raw.checklist.nonDealers.map(item => `<li>${item}</li>`).join('') + `</ul>`;
        }
        w.document.write(`<html><head><title>${loc.name} - Copart Licensing</title><style>body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;padding:48px;color:#1e293b;line-height:1.6;max-width:720px}h1{font-size:22px;color:#0f172a;border-bottom:2px solid #e2e8f0;padding-bottom:12px;font-weight:600}h2{font-size:14px;color:#334155;margin-top:28px;text-transform:uppercase;letter-spacing:0.5px;border-bottom:1px solid #f1f5f9;padding-bottom:6px;font-weight:600}h3{font-size:12px;color:#475569;margin-top:16px;text-transform:uppercase}ul{padding-left:20px}li{margin-bottom:8px;font-size:13px;color:#334155}.meta{font-size:12px;color:#64748b;margin-bottom:28px}.summary{background:#f8fafc;border-left:3px solid #22D3EE;padding:14px 16px;font-size:13px;color:#475569;margin-bottom:24px;border-radius:0 8px 8px 0}.footer{margin-top:40px;font-size:11px;color:#94a3b8;text-align:center;border-top:1px solid #f1f5f9;padding-top:16px}</style></head><body><h1>${loc.name} Licensing Requirements</h1><div class="meta">${loc.country} · ${regionLabel(loc.regionType)}</div><div class="summary">${loc.generalReq || ''}</div>${reqsHtml}${checklistHtml}<h2>Official Resources</h2><ul>${loc.officialLinks && loc.officialLinks.length?loc.officialLinks.map(l=>`<li><a href="${l.url}">${l.title}</a></li>`).join(''):'<li>Not available in dataset</li>'}</ul><div class="footer">Copart compliance document. Verify before activation.</div><script>window.onload=function(){window.print();setTimeout(function(){window.close()},600)}<\/script></body></html>`);
        w.document.close();
        notify('PDF print triggered');
      };

      return (
        <motion.div
          initial={{ x: 32, opacity: 0 }}
          animate={{ x: 0, opacity: 1 }}
          transition={{ type: 'spring', stiffness: 300, damping: 30, duration: 0.3 }}
          style={{ flex:1, display:'flex', flexDirection:'column', height:'100%', overflow:'hidden', position:'relative' }}>

          {/* Header */}
          <div style={{ position:'absolute', top:0, left:0, right:0, height:64, padding:'0 20px', borderBottom:'1px solid var(--border)', display:'flex', alignItems:'center', justifyContent:'space-between', zIndex:10, background:'rgba(10,15,30,0.7)', backdropFilter:'blur(12px) saturate(180%)', WebkitBackdropFilter:'blur(12px) saturate(180%)' }}>
            <div style={{ borderLeft:'3px solid var(--accent)', paddingLeft:12, display:'flex', alignItems:'center', gap:10 }}>
              <FlagDisplay loc={loc} size={22} />
              <div>
                <div style={{ fontSize:18, fontWeight:600, color:'var(--text-1)', lineHeight:1.2, letterSpacing:'-0.01em' }}>{loc.name}</div>
                <div style={{ fontSize:10, color:'var(--text-3)', marginTop:1, fontWeight:500, letterSpacing:'0.06em', textTransform:'uppercase' }}>{loc.country} · {regionLabel(loc.regionType)}</div>
              </div>
            </div>
            <button onClick={onClose}
              style={{ width:28, height:28, borderRadius:8, background:'var(--card)', border:'1px solid var(--border)', cursor:'pointer', color:'var(--text-3)', transition:'all 0.18s ease', display:'flex', alignItems:'center', justifyContent:'center' }}
              onMouseEnter={e => { e.currentTarget.style.background='var(--card-hover)'; e.currentTarget.style.color='var(--text-1)'; }}
              onMouseLeave={e => { e.currentTarget.style.background='var(--card)'; e.currentTarget.style.color='var(--text-3)'; }}>
              <X style={{ width:14, height:14 }} />
            </button>
          </div>

          {/* Content */}
          <div style={{ flex:1, overflowY:'auto', padding:'76px 20px 20px' }}>
            <div style={{ display:'flex', flexDirection:'column', gap:20 }}>

              {/* Bid Card Warning */}
              {bidCardItem && (
                <div style={{ background:'var(--warning-dim)', border:'1px solid rgba(245,158,11,0.3)', borderRadius:'var(--radius-card)', padding:'12px 16px', display:'flex', gap:12, alignItems:'flex-start' }}>
                  <AlertTriangle style={{ width:16, height:16, color:'var(--warning)', flexShrink:0, marginTop:1 }} />
                  <div>
                    <div style={{ fontSize:13, fontWeight:600, color:'var(--warning)' }}>Bid Card Required</div>
                    {bidCardItem.issuedBy && bidCardItem.issuedBy.trim() && (
                      <div style={{ fontSize:11, color:'var(--text-2)', marginTop:2 }}>{bidCardItem.issuedBy}</div>
                    )}
                  </div>
                </div>
              )}

              {/* General Requirements */}
              {loc.generalReq && (
                <div style={{ background:'var(--card)', borderRadius:'var(--radius-card)', padding:'12px 14px', border:'1px solid var(--border)' }}>
                  <div style={{ fontSize:13, color:'var(--text-2)', lineHeight:1.55, fontWeight:400 }}>{loc.generalReq}</div>
                </div>
              )}

              {/* Raw Requirements Sections */}
              {loc.raw && loc.raw.requirements && loc.raw.requirements.map((sec, secIdx) => (
                <Section key={secIdx} title={sec.section}>
                  <div style={{ display:'flex', flexDirection:'column', gap:6 }}>
                    {(sec.items || []).map((it, itemIdx) => (
                      <div key={itemIdx}
                        style={{ display:'flex', gap:12, padding:'10px 14px', background:'var(--card)', borderRadius:'var(--radius-card)', border:'1px solid var(--border)', alignItems:'flex-start', transition:'all 0.18s cubic-bezier(0.22,1,0.36,1)' }}
                        onMouseEnter={e => { e.currentTarget.style.borderColor='var(--border-strong)'; e.currentTarget.style.background='var(--card-hover)'; }}
                        onMouseLeave={e => { e.currentTarget.style.borderColor='var(--border)'; e.currentTarget.style.background='var(--card)'; }}>
                        <span style={{ fontFamily:'var(--font-mono)', fontSize:11, color:'var(--text-3)', minWidth:22, flexShrink:0, marginTop:2, textAlign:'right' }}>{String(itemIdx + 1).padStart(2, '0')}</span>
                        <div style={{ display:'flex', flexDirection:'column', gap:3, flex:1 }}>
                          <span style={{ fontSize:13, fontWeight:500, color:'var(--text-1)', lineHeight:1.45 }}>{it.name}</span>
                          {it.description && it.description.trim() && (
                            <span style={{ fontSize:13, color:'var(--text-2)', lineHeight:1.5, fontWeight:400 }}>{it.description}</span>
                          )}
                          {it.issuedBy && it.issuedBy.trim() && (
                            <span style={{ fontSize:11, fontWeight:400, color:'var(--text-3)', fontStyle:'italic' }}>→ {it.issuedBy}</span>
                          )}
                        </div>
                      </div>
                    ))}
                  </div>
                </Section>
              ))}

              {/* Checklists */}
              {hasChecklists && (
                <Section title="Required Documents Checklist">
                  <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
                    {loc.raw.checklist.existing && loc.raw.checklist.existing.length > 0 && (
                      <ChecklistBlock title="Existing Members" items={loc.raw.checklist.existing} />
                    )}
                    {loc.raw.checklist.dealers && loc.raw.checklist.dealers.length > 0 && (
                      <ChecklistBlock title="Dealers" items={loc.raw.checklist.dealers} />
                    )}
                    {loc.raw.checklist.nonDealers && loc.raw.checklist.nonDealers.length > 0 && (
                      <ChecklistBlock title="Non-Dealers" items={loc.raw.checklist.nonDealers} />
                    )}
                  </div>
                </Section>
              )}

              {/* Permitted Roles */}
              {hasPermittedRoles && (
                <Section title="Permitted Signer Roles">
                  <div style={{ display:'flex', flexDirection:'column', gap:14 }}>
                    {loc.raw.permittedRoles.acceptable && loc.raw.permittedRoles.acceptable.length > 0 && (
                      <div>
                        <div style={{ fontSize:11, fontWeight:600, color:'var(--success)', letterSpacing:'0.04em', textTransform:'uppercase', marginBottom:8 }}>Acceptable Signers</div>
                        <div style={{ display:'flex', flexWrap:'wrap', gap:6 }}>
                          {loc.raw.permittedRoles.acceptable.map((role, idx) => (
                            <span key={idx} style={{ padding:'4px 10px', background:'rgba(52,211,153,0.08)', border:'1px solid rgba(52,211,153,0.25)', borderRadius:'var(--radius-pill)', fontSize:11, fontWeight:500, color:'var(--success)' }}>{role}</span>
                          ))}
                        </div>
                      </div>
                    )}
                    {loc.raw.permittedRoles.unacceptable && loc.raw.permittedRoles.unacceptable.length > 0 && (
                      <div>
                        <div style={{ fontSize:11, fontWeight:600, color:'var(--warning)', letterSpacing:'0.04em', textTransform:'uppercase', marginBottom:8 }}>Unacceptable Signers</div>
                        <div style={{ display:'flex', flexWrap:'wrap', gap:6 }}>
                          {loc.raw.permittedRoles.unacceptable.map((role, idx) => (
                            <span key={idx} style={{ padding:'4px 10px', background:'rgba(248,113,113,0.08)', border:'1px solid rgba(248,113,113,0.25)', borderRadius:'var(--radius-pill)', fontSize:11, fontWeight:500, color:'var(--danger)' }}>{role}</span>
                          ))}
                        </div>
                      </div>
                    )}
                  </div>
                </Section>
              )}

              {/* Links */}
              <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:12 }}>
                <div>
                  <SectionLabel>Official Links</SectionLabel>
                  {loc.officialLinks && loc.officialLinks.length > 0 ? loc.officialLinks.map((l, i) => (
                    <LinkCard key={i} title={l.title} url={l.url} />
                  )) : (
                    <div style={{ padding:'9px 12px', background:'var(--card)', borderRadius:'var(--radius-card)', border:'1px dashed var(--border)', fontSize:12, color:'var(--text-3)', fontWeight:400, lineHeight:1.45 }}>Not available in dataset.</div>
                  )}
                </div>
                <div>
                  <SectionLabel>Copart Resources</SectionLabel>
                  {loc.copartLinks.map((l, i) => <LinkCard key={i} title={l.title} url={l.url} />)}
                </div>
              </div>

              {/* Notes */}
              {loc.raw && loc.raw.notes && loc.raw.notes.length > 0 && (
                <div style={{ background:'var(--accent-glow)', border:'1px solid rgba(34,211,238,0.08)', borderRadius:'var(--radius-card)', padding:'12px 14px' }}>
                  <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:8 }}>
                    <Shield style={{ width:12, height:12, color:'var(--accent)' }} />
                    <span style={{ fontSize:11, fontWeight:600, color:'var(--accent)', letterSpacing:'0.06em', textTransform:'uppercase' }}>Notes</span>
                  </div>
                  <div style={{ display:'flex', flexDirection:'column', gap:6 }}>
                    {loc.raw.notes.map((n, i) => (
                      <div key={i} style={{ fontSize:13, color:'var(--text-2)', lineHeight:1.5, fontWeight:400, paddingLeft:12, borderLeft:'2px solid rgba(34,211,238,0.12)' }}>{n}</div>
                    ))}
                  </div>
                </div>
              )}

              <div style={{ height:1, background:'var(--border)' }} />

              {/* Member Response Box */}
              <div>
                <SectionLabel>Copy Paste Data</SectionLabel>
                <div style={{ position:'relative', background:'rgba(4,6,14,0.8)', border:'1px solid var(--border-strong)', borderRadius:'var(--radius-card)', padding:16, fontFamily:'var(--font-mono)', fontSize:'clamp(11px,1vw,13px)', color:'var(--text-2)', lineHeight:1.7, letterSpacing:'0.01em', maxHeight:180, overflowY:'auto', whiteSpace:'pre-wrap', userSelect:'text' }}>
                  <span style={{ position:'absolute', top:8, right:10, fontSize:9, fontWeight:600, letterSpacing:'0.06em', textTransform:'uppercase', color:'var(--text-4)' }}>Response</span>
                  {rawText}
                </div>
              </div>

              {/* Action Buttons */}
              <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:8 }}>
                <CopyBtn label="Copy Response" copiedLabel="Copied" icon={Copy} active={copiedKey === 'response'} primary onClick={copyResponse} />
                <CopyBtn label="Copy Requirements" copiedLabel="Copied" icon={FileText} active={copiedKey === 'docs'} onClick={copyDocs} />
                <CopyBtn label="Copy Links" copiedLabel="Copied" icon={ExternalLink} active={copiedKey === 'links'} onClick={copyLinks} />
                <CopyBtn label="Download PDF" icon={Download} onClick={downloadPdf} />
              </div>
            </div>
          </div>
        </motion.div>
      );
    };

    // ─── Shared Components ───

    const Section = ({ title, children }) => (
      <div>
        <SectionLabel>{title}</SectionLabel>
        {children}
      </div>
    );

    const SectionLabel = ({ children }) => (
      <div style={{ fontSize:11, fontWeight:600, color:'var(--text-3)', letterSpacing:'0.06em', textTransform:'uppercase', marginBottom:10, paddingBottom:6, borderBottom:'1px solid var(--border)' }}>{children}</div>
    );

    const ChecklistBlock = ({ title, items }) => (
      <div style={{ background:'rgba(255,255,255,0.01)', border:'1px solid var(--border)', borderRadius:'var(--radius-card)', padding:14 }}>
        <div style={{ fontSize:11, fontWeight:600, color:'var(--accent)', letterSpacing:'0.04em', textTransform:'uppercase', marginBottom:8 }}>{title}</div>
        <div style={{ display:'flex', flexDirection:'column', gap:6 }}>
          {items.map((item, idx) => (
            <div key={idx} style={{ display:'flex', alignItems:'center', gap:8, fontSize:13, color:'var(--text-2)', fontWeight:400 }}>
              <Check style={{ width:14, height:14, color:'var(--success)', flexShrink:0 }} />
              <span>{item}</span>
            </div>
          ))}
        </div>
      </div>
    );

    const LinkCard = ({ title, url }) => (
      <a href={url} target="_blank" rel="noopener noreferrer"
        style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'9px 12px', background:'var(--card)', border:'1px solid var(--border)', borderRadius:'var(--radius-card)', fontSize:12, fontWeight:500, color:'var(--text-2)', textDecoration:'none', transition:'all 0.18s cubic-bezier(0.22,1,0.36,1)', marginBottom:6 }}
        onMouseEnter={e => { e.currentTarget.style.borderColor='var(--accent)'; e.currentTarget.style.color='var(--accent)'; }}
        onMouseLeave={e => { e.currentTarget.style.borderColor='var(--border)'; e.currentTarget.style.color='var(--text-2)'; }}>
        <span style={{ overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap', paddingRight:8 }}>{title}</span>
        <ExternalLink style={{ width:10, height:10, flexShrink:0, color:'var(--text-4)' }} />
      </a>
    );

    const CopyBtn = ({ label, copiedLabel, icon: Icon, active, primary, onClick }) => (
      <button onClick={onClick}
        onMouseDown={e => e.currentTarget.style.transform = 'scale(0.97)'}
        onMouseUp={e => e.currentTarget.style.transform = 'scale(1)'}
        style={{
          padding:'11px 12px', borderRadius:'var(--radius-button)', fontSize: primary ? 13 : 12, fontWeight:600, cursor:'pointer', transition:'all 0.18s cubic-bezier(0.22,1,0.36,1)', display:'flex', alignItems:'center', justifyContent:'center', gap:7, border:'none',
          ...(primary
            ? { background: active ? 'var(--success)' : 'var(--accent)', color: active ? '#fff' : 'var(--bg)', animation: active ? 'copyPulse 0.3s ease' : 'none' }
            : { background: active ? 'rgba(34,211,238,0.08)' : 'var(--card)', color: active ? 'var(--accent)' : 'var(--text-2)', border:'1px solid var(--border-strong)' })
        }}
        onMouseEnter={e => {
          if (primary && !active) e.currentTarget.style.opacity = '0.9';
          if (!primary && !active) { e.currentTarget.style.borderColor = 'var(--accent)'; e.currentTarget.style.color = 'var(--accent)'; }
        }}
        onMouseLeave={e => {
          if (primary && !active) e.currentTarget.style.opacity = '1';
          if (!primary && !active) { e.currentTarget.style.borderColor = 'var(--border-strong)'; e.currentTarget.style.color = 'var(--text-2)'; }
        }}>
        {active ? <Check style={{ width:14, height:14, strokeWidth:3, color: primary ? '#fff' : 'var(--success)' }} /> : <Icon style={{ width:14, height:14 }} />}
        {active ? (copiedLabel || 'Copied') : label}
      </button>
    );

    // ─── Mount ───
    createRoot(document.getElementById('root')).render(<App />);
  </script>


</body>
</html>
